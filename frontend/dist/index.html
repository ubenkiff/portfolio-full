<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uddi Benkiff Awinda - Professional Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .carousel {
      position: relative;
      overflow: hidden;
    }
    .carousel-inner {
      display: flex;
      transition: transform 0.3s ease;
    }
    .carousel-item {
      flex-shrink: 0;
      width: 100%;
    }
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 50%;
      z-index: 10;
    }
    .carousel-btn:hover { background: rgba(0,0,0,0.9); }
    .carousel-btn-prev { left: 10px; }
    .carousel-btn-next { right: 10px; }
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #64748b;
      cursor: pointer;
    }
    .carousel-dot.active { background: #3b82f6; }
    
    @media print {
      .no-print { display: none !important; }
      body { background: white; margin: 0; padding: 0; }
      .shadow-lg { box-shadow: none !important; }
    }
  </style>
</head>
<body class="bg-slate-900">
  <!-- Print Button -->
  <div class="fixed bottom-6 right-6 z-50 no-print">
    <a href="/resume.html" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-full shadow-lg flex items-center gap-2 transition text-sm">
      <i class="fas fa-file-alt"></i> View Printable Resume
    </a>
  </div>

  <div id="content" class="max-w-6xl mx-auto p-6">
    <div class="text-center text-white text-xl">Loading portfolio...</div>
  </div>

  <script>
    const API_URL = '/api';
    let carouselIndices = {};

    async function loadPortfolio() {
      try {
        const [profile, experience, education, skills, projects, achievements] = await Promise.all([
          fetch(`${API_URL}/profile`).then(r => r.json()),
          fetch(`${API_URL}/experience`).then(r => r.json()),
          fetch(`${API_URL}/education`).then(r => r.json()),
          fetch(`${API_URL}/skills`).then(r => r.json()),
          fetch(`${API_URL}/projects`).then(r => r.json()),
          fetch(`${API_URL}/achievements`).then(r => r.json())
        ]);

        const skillsByCategory = {};
        skills.forEach(s => {
          if (!skillsByCategory[s.category]) skillsByCategory[s.category] = [];
          skillsByCategory[s.category].push(s);
        });

        let html = `
          <!-- Header - Reduced height -->
          <div class="bg-slate-800 rounded-2xl p-4 mb-6 border border-slate-700">
            <div class="flex flex-col md:flex-row gap-4 items-center">
              ${profile.avatar_url ? `<img src="${profile.avatar_url}" class="w-20 h-20 rounded-full object-cover border-4 border-blue-500">` : ''}
              <div class="text-center md:text-left">
                <h1 class="text-2xl font-bold text-white">${profile.name || 'Uddi Benkiff Awinda'}</h1>
                <p class="text-md text-blue-400 mt-1">${profile.title || 'Civil Engineer'}</p>
                <div class="flex flex-wrap gap-3 mt-2 text-slate-400 text-sm">
                  ${profile.email ? `<span><i class="fas fa-envelope text-xs"></i> ${profile.email}</span>` : ''}
                  ${profile.phone ? `<span><i class="fas fa-phone text-xs"></i> ${profile.phone}</span>` : ''}
                  ${profile.location ? `<span><i class="fas fa-map-marker-alt text-xs"></i> ${profile.location}</span>` : ''}
                  ${profile.linkedin ? `<a href="${profile.linkedin}" target="_blank" class="hover:text-blue-400"><i class="fab fa-linkedin text-xs"></i> LinkedIn</a>` : ''}
                </div>
              </div>
            </div>
          </div>

          <!-- Experience -->
          <div class="bg-slate-800 rounded-2xl p-6 mb-6 border border-slate-700">
            <h2 class="text-lg font-bold text-white mb-4"><i class="fas fa-briefcase text-blue-400 mr-2"></i>Work Experience</h2>
        `;

        experience.forEach((exp, idx) => {
          html += `
            <div class="mb-5">
              <div class="flex flex-wrap justify-between items-start">
                <div>
                  <h3 class="text-md font-semibold text-white">${exp.job_title}</h3>
                  <p class="text-blue-400 text-sm">${exp.company}${exp.location ? ` | ${exp.location}` : ''}</p>
                </div>
                <span class="text-slate-400 text-xs">${exp.start_date} — ${exp.current ? 'Present' : exp.end_date}</span>
              </div>
              <p class="text-slate-300 text-sm mt-1">${exp.description || ''}</p>
              ${exp.highlights && exp.highlights.length > 0 ? `<ul class="mt-2 space-y-1">${exp.highlights.map(h => `<li class="text-slate-400 text-xs flex items-start gap-2"><i class="fas fa-circle text-blue-500 text-[6px] mt-1.5"></i>${h}</li>`).join('')}</ul>` : ''}
              ${idx < experience.length - 1 ? '<div class="border-b border-slate-700 mt-3 pt-2"></div>' : ''}
            </div>
          `;
        });

        html += `</div>`;

        // Skills
        html += `<div class="bg-slate-800 rounded-2xl p-6 mb-6 border border-slate-700">
            <h2 class="text-lg font-bold text-white mb-4"><i class="fas fa-code text-blue-400 mr-2"></i>Technical Skills</h2>
            <div class="grid md:grid-cols-2 gap-5">`;

        for (const [category, catSkills] of Object.entries(skillsByCategory)) {
          html += `
            <div>
              <h3 class="text-sm font-semibold text-blue-400 mb-2">${category}</h3>
              <div class="flex flex-wrap gap-2">
                ${catSkills.map(s => `<span class="px-2 py-1 bg-slate-700 rounded-md text-xs text-slate-300">${s.name}${s.level ? ` <span class="text-blue-400">(${s.level})</span>` : ''}</span>`).join('')}
              </div>
            </div>
          `;
        }

        html += `</div></div>`;

        // Projects with Carousel
        html += `<div class="bg-slate-800 rounded-2xl p-6 mb-6 border border-slate-700">
            <h2 class="text-lg font-bold text-white mb-4"><i class="fas fa-folder-open text-blue-400 mr-2"></i>Key Projects</h2>
            <div class="grid md:grid-cols-2 gap-5">`;

        projects.forEach((project, idx) => {
          const hasImages = project.image_urls && project.image_urls.length > 0;
          const imageUrls = hasImages ? project.image_urls : [];
          carouselIndices[idx] = 0;
          
          html += `
            <div class="bg-slate-700 rounded-xl overflow-hidden">
              ${hasImages ? `
                <div class="carousel relative" id="carousel-${idx}">
                  <div class="carousel-inner" id="carousel-inner-${idx}" style="width: ${imageUrls.length * 100}%">
                    ${imageUrls.map((url, imgIdx) => `
                      <div class="carousel-item" style="width: ${100 / imageUrls.length}%">
                        <img src="${url}" class="w-full h-48 object-cover cursor-pointer hover:opacity-90 transition" onclick="window.open('${url}', '_blank')">
                      </div>
                    `).join('')}
                  </div>
                  ${imageUrls.length > 1 ? `
                    <button class="carousel-btn carousel-btn-prev" onclick="prevImage(${idx})"><i class="fas fa-chevron-left text-sm"></i></button>
                    <button class="carousel-btn carousel-btn-next" onclick="nextImage(${idx})"><i class="fas fa-chevron-right text-sm"></i></button>
                    <div class="carousel-dots" id="carousel-dots-${idx}">
                      ${imageUrls.map((_, dotIdx) => `<div class="carousel-dot ${dotIdx === 0 ? 'active' : ''}" onclick="goToImage(${idx}, ${dotIdx})"></div>`).join('')}
                    </div>
                  ` : ''}
                </div>
              ` : ''}
              <div class="p-4">
                <h3 class="text-md font-semibold text-white mb-1">${project.title}</h3>
                <p class="text-slate-300 text-xs leading-relaxed">${project.description || ''}</p>
                ${project.tech_stack && project.tech_stack.length > 0 ? `<div class="flex flex-wrap gap-1 mt-2">${project.tech_stack.map(t => `<span class="px-1.5 py-0.5 bg-slate-600 rounded text-[10px] text-slate-300">${t}</span>`).join('')}</div>` : ''}
                ${project.live_url ? `<div class="mt-2"><a href="${project.live_url}" target="_blank" class="text-blue-400 hover:text-blue-300 text-xs"><i class="fas fa-external-link-alt mr-1"></i>View Project</a></div>` : ''}
              </div>
            </div>
          `;
        });

        html += `</div></div>`;

        // Education & Achievements Row
        html += `<div class="grid md:grid-cols-2 gap-6">`;

        // Education
        html += `<div class="bg-slate-800 rounded-2xl p-6 border border-slate-700">
            <h2 class="text-lg font-bold text-white mb-4"><i class="fas fa-graduation-cap text-blue-400 mr-2"></i>Education</h2>`;

        education.forEach(edu => {
          html += `
            <div class="mb-3 last:mb-0">
              <div class="flex flex-wrap justify-between items-start">
                <div>
                  <h3 class="text-sm font-semibold text-white">${edu.degree}${edu.field ? ` in ${edu.field}` : ''}</h3>
                  <p class="text-blue-400 text-xs">${edu.institution}${edu.location ? `, ${edu.location}` : ''}</p>
                </div>
                <span class="text-slate-400 text-xs">${edu.start_year} — ${edu.end_year || 'Present'}</span>
              </div>
              ${edu.grade ? `<p class="text-yellow-500 text-xs mt-1"><i class="fas fa-star text-[10px] mr-1"></i>Grade: ${edu.grade}</p>` : ''}
            </div>
            ${education.indexOf(edu) < education.length - 1 ? '<div class="border-b border-slate-700 my-2"></div>' : ''}
          `;
        });

        html += `</div>`;

        // Achievements
        html += `<div class="bg-slate-800 rounded-2xl p-6 border border-slate-700">
            <h2 class="text-lg font-bold text-white mb-4"><i class="fas fa-trophy text-yellow-500 mr-2"></i>Achievements</h2>`;

        achievements.forEach(ach => {
          html += `
            <div class="mb-3 last:mb-0 border-l-2 border-yellow-500 pl-3">
              <h3 class="text-sm font-semibold text-white">${ach.title}</h3>
              <p class="text-slate-400 text-xs">${ach.issuer} • ${ach.date}</p>
              ${ach.description ? `<p class="text-slate-300 text-xs mt-1">${ach.description}</p>` : ''}
            </div>
            ${achievements.indexOf(ach) < achievements.length - 1 ? '<div class="border-b border-slate-700 my-2"></div>' : ''}
          `;
        });

        html += `</div></div>`;

        document.getElementById('content').innerHTML = html;

        projects.forEach((_, idx) => { carouselIndices[idx] = 0; });

      } catch (error) {
        document.getElementById('content').innerHTML = `<div class="text-red-500 text-center p-8">Error loading data. Please try again.</div>`;
        console.error(error);
      }
    }

    window.prevImage = function(projectId) {
      const inner = document.getElementById(`carousel-inner-${projectId}`);
      const items = inner.querySelectorAll('.carousel-item');
      const dots = document.querySelectorAll(`#carousel-dots-${projectId} .carousel-dot`);
      if (carouselIndices[projectId] > 0) {
        carouselIndices[projectId]--;
        inner.style.transform = `translateX(-${carouselIndices[projectId] * (100 / items.length)}%)`;
        dots.forEach((dot, idx) => { dot.classList.toggle('active', idx === carouselIndices[projectId]); });
      }
    };

    window.nextImage = function(projectId) {
      const inner = document.getElementById(`carousel-inner-${projectId}`);
      const items = inner.querySelectorAll('.carousel-item');
      const dots = document.querySelectorAll(`#carousel-dots-${projectId} .carousel-dot`);
      if (carouselIndices[projectId] < items.length - 1) {
        carouselIndices[projectId]++;
        inner.style.transform = `translateX(-${carouselIndices[projectId] * (100 / items.length)}%)`;
        dots.forEach((dot, idx) => { dot.classList.toggle('active', idx === carouselIndices[projectId]); });
      }
    };

    window.goToImage = function(projectId, index) {
      const inner = document.getElementById(`carousel-inner-${projectId}`);
      const items = inner.querySelectorAll('.carousel-item');
      const dots = document.querySelectorAll(`#carousel-dots-${projectId} .carousel-dot`);
      carouselIndices[projectId] = index;
      inner.style.transform = `translateX(-${index * (100 / items.length)}%)`;
      dots.forEach((dot, idx) => { dot.classList.toggle('active', idx === index); });
    };

    loadPortfolio();
  </script>
</body>
</html>
