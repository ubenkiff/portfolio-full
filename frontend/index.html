<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uddi Benkiff - Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900">
  <div id="content" class="max-w-6xl mx-auto p-8">
    <div class="text-center text-white text-xl">Loading portfolio...</div>
  </div>

  <script>
    const API_URL = '/api';

    async function loadPortfolio() {
      try {
        const [profile, experience, education, skills, projects, achievements] = await Promise.all([
          fetch(`${API_URL}/profile`).then(r => r.json()),
          fetch(`${API_URL}/experience`).then(r => r.json()),
          fetch(`${API_URL}/education`).then(r => r.json()),
          fetch(`${API_URL}/skills`).then(r => r.json()),
          fetch(`${API_URL}/projects`).then(r => r.json()),
          fetch(`${API_URL}/achievements`).then(r => r.json())
        ]);

        // Group skills by category
        const skillsByCategory = {};
        skills.forEach(s => {
          if (!skillsByCategory[s.category]) skillsByCategory[s.category] = [];
          skillsByCategory[s.category].push(s);
        });

        let html = `
          <!-- Header -->
          <div class="bg-slate-800 rounded-2xl p-8 mb-8">
            <div class="flex flex-col md:flex-row gap-6 items-center">
              ${profile.avatar_url ? `<img src="${profile.avatar_url}" class="w-32 h-32 rounded-full object-cover border-4 border-blue-500">` : ''}
              <div class="text-center md:text-left">
                <h1 class="text-3xl font-bold text-white">${profile.name || 'Uddi Benkiff Awinda'}</h1>
                <p class="text-xl text-blue-400 mt-2">${profile.title || 'Civil Engineer'}</p>
                <p class="text-slate-300 mt-4">${profile.bio || ''}</p>
                <div class="flex flex-wrap gap-4 mt-4 text-slate-400">
                  ${profile.email ? `<span><i class="fas fa-envelope"></i> ${profile.email}</span>` : ''}
                  ${profile.phone ? `<span><i class="fas fa-phone"></i> ${profile.phone}</span>` : ''}
                  ${profile.location ? `<span><i class="fas fa-map-marker-alt"></i> ${profile.location}</span>` : ''}
                </div>
              </div>
            </div>
          </div>

          <!-- Experience -->
          <div class="bg-slate-800 rounded-2xl p-8 mb-8">
            <h2 class="text-xl font-bold text-white mb-4"><i class="fas fa-briefcase text-blue-400 mr-2"></i>Work Experience</h2>
        `;

        experience.forEach(exp => {
          html += `
            <div class="border-l-2 border-blue-500 pl-4 mb-6">
              <div class="flex justify-between flex-wrap">
                <h3 class="text-lg font-semibold text-white">${exp.job_title}</h3>
                <span class="text-slate-400 text-sm">${exp.start_date} — ${exp.current ? 'Present' : exp.end_date}</span>
              </div>
              <p class="text-blue-400">${exp.company}${exp.location ? ` | ${exp.location}` : ''}</p>
              <p class="text-slate-300 mt-1">${exp.description || ''}</p>
            </div>
          `;
        });

        html += `</div>`;

        // Skills
        html += `<div class="bg-slate-800 rounded-2xl p-8 mb-8">
            <h2 class="text-xl font-bold text-white mb-4"><i class="fas fa-code text-blue-400 mr-2"></i>Technical Skills</h2>
            <div class="grid md:grid-cols-2 gap-6">`;

        for (const [category, catSkills] of Object.entries(skillsByCategory)) {
          html += `
            <div>
              <h3 class="text-md font-semibold text-blue-400 mb-2">${category}</h3>
              <div class="flex flex-wrap gap-2">
                ${catSkills.map(s => `<span class="px-3 py-1 bg-slate-700 rounded-full text-sm text-slate-300">${s.name}</span>`).join('')}
              </div>
            </div>
          `;
        }

        html += `</div></div>`;

        document.getElementById('content').innerHTML = html;
      } catch (error) {
        document.getElementById('content').innerHTML = `<div class="text-red-500 text-center p-8">Error loading data. Please try again.</div>`;
        console.error(error);
      }
    }

    loadPortfolio();
  </script>
</body>
</html>
