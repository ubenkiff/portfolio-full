<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uddi Benkiff Awinda - Professional Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .carousel {
      position: relative;
      overflow: hidden;
    }
    .carousel-inner {
      display: flex;
      transition: transform 0.3s ease;
    }
    .carousel-item {
      flex-shrink: 0;
      width: 100%;
    }
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 50%;
      z-index: 10;
      transition: background 0.2s;
    }
    .carousel-btn:hover {
      background: rgba(0,0,0,0.9);
    }
    .carousel-btn-prev { left: 10px; }
    .carousel-btn-next { right: 10px; }
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #64748b;
      cursor: pointer;
      transition: background 0.2s;
    }
    .carousel-dot.active {
      background: #3b82f6;
    }
    @media print {
      .no-print { display: none; }
      body { background: white; }
      .bg-slate-800, .bg-slate-700 { background: white !important; border: 1px solid #ddd; }
      .text-white { color: black !important; }
      .text-slate-300, .text-slate-400 { color: #666 !important; }
    }
  </style>
</head>
<body class="bg-slate-900">
  <div id="content" class="max-w-6xl mx-auto p-8">
    <div class="text-center text-white text-xl">Loading portfolio...</div>
  </div>

  <script>
   const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:3001/api' : '/api';

    async function loadPortfolio() {
      try {
        const [profile, experience, education, skills, projects, achievements] = await Promise.all([
          fetch(`${API_URL}/profile`).then(r => r.json()),
          fetch(`${API_URL}/experience`).then(r => r.json()),
          fetch(`${API_URL}/education`).then(r => r.json()),
          fetch(`${API_URL}/skills`).then(r => r.json()),
          fetch(`${API_URL}/projects`).then(r => r.json()),
          fetch(`${API_URL}/achievements`).then(r => r.json())
        ]);

        // Group skills by category
        const skillsByCategory = {};
        skills.forEach(s => {
          if (!skillsByCategory[s.category]) skillsByCategory[s.category] = [];
          skillsByCategory[s.category].push(s);
        });

        let html = `
          <!-- Header -->
          <div class="bg-slate-800 rounded-2xl p-8 mb-8 border border-slate-700">
            <div class="flex flex-col md:flex-row gap-6 items-center">
              ${profile.avatar_url ? `<img src="${profile.avatar_url}" class="w-32 h-32 rounded-full object-cover border-4 border-blue-500">` : '<div class="w-32 h-32 rounded-full bg-slate-700 flex items-center justify-center"><i class="fas fa-user text-4xl text-slate-500"></i></div>'}
              <div class="text-center md:text-left">
                <h1 class="text-3xl md:text-4xl font-bold text-white">${profile.name || 'Uddi Benkiff Awinda'}</h1>
                <p class="text-xl text-blue-400 mt-2">${profile.title || 'PM | Civil Projects Engineer | Structural Design Engineer'}</p>
                <p class="text-slate-300 mt-4 leading-relaxed">${profile.bio || ''}</p>
                <div class="flex flex-wrap gap-4 mt-4 justify-center md:justify-start text-slate-400">
                  ${profile.email ? `<span><i class="fas fa-envelope text-blue-400 mr-1"></i> ${profile.email}</span>` : ''}
                  ${profile.phone ? `<span><i class="fas fa-phone text-green-400 mr-1"></i> ${profile.phone}</span>` : ''}
                  ${profile.location ? `<span><i class="fas fa-map-marker-alt text-red-400 mr-1"></i> ${profile.location}</span>` : ''}
                  ${profile.linkedin ? `<a href="${profile.linkedin}" target="_blank" class="hover:text-blue-400 transition"><i class="fab fa-linkedin text-blue-400 mr-1"></i> LinkedIn</a>` : ''}
                </div>
              </div>
            </div>
          </div>

          <!-- Experience -->
          <div class="bg-slate-800 rounded-2xl p-8 mb-8 border border-slate-700">
            <h2 class="text-xl font-bold text-white mb-4"><i class="fas fa-briefcase text-blue-400 mr-2"></i>Work Experience</h2>
        `;

        experience.forEach((exp, index) => {
          html += `
            <div class="mb-6">
              <div class="flex flex-wrap justify-between items-start">
                <div>
                  <h3 class="text-lg font-semibold text-white">${exp.job_title}</h3>
                  <p class="text-blue-400">${exp.company}${exp.location ? ` | ${exp.location}` : ''}</p>
                </div>
                <span class="text-slate-400 text-sm">${exp.start_date} — ${exp.current ? 'Present' : exp.end_date}</span>
              </div>
              <p class="text-slate-300 mt-2">${exp.description || ''}</p>
              ${exp.highlights && exp.highlights.length > 0 ? `<ul class="mt-2 space-y-1">${exp.highlights.map(h => `<li class="text-slate-400 text-sm flex items-start gap-2"><i class="fas fa-circle text-blue-500 text-xs mt-1.5"></i>${h}</li>`).join('')}</ul>` : ''}
              ${index < experience.length - 1 ? '<div class="border-b border-slate-700 mt-4 pt-2"></div>' : ''}
            </div>
          `;
        });

        html += `</div>`;

        // Skills
        html += `<div class="bg-slate-800 rounded-2xl p-8 mb-8 border border-slate-700">
            <h2 class="text-xl font-bold text-white mb-4"><i class="fas fa-code text-blue-400 mr-2"></i>Technical Skills</h2>
            <div class="grid md:grid-cols-2 gap-6">`;

        for (const [category, catSkills] of Object.entries(skillsByCategory)) {
          html += `
            <div>
              <h3 class="text-md font-semibold text-blue-400 mb-3">${category}</h3>
              <div class="flex flex-wrap gap-2">
                ${catSkills.map(s => `<span class="px-3 py-1.5 bg-slate-700 rounded-lg text-sm text-slate-300">${s.name}${s.level ? ` <span class="text-blue-400">(${s.level})</span>` : ''}</span>`).join('')}
              </div>
            </div>
          `;
        }

        html += `</div></div>`;

        // Projects with Image Carousel
        html += `<div class="bg-slate-800 rounded-2xl p-8 mb-8 border border-slate-700">
            <h2 class="text-xl font-bold text-white mb-4"><i class="fas fa-folder-open text-blue-400 mr-2"></i>Key Projects</h2>
            <div class="grid md:grid-cols-2 gap-6">`;

        projects.forEach((project, projectIndex) => {
          const hasImages = project.image_urls && project.image_urls.length > 0;
          const imageUrls = hasImages ? project.image_urls : [];
          
          html += `
            <div class="bg-slate-700 rounded-xl overflow-hidden">
              ${hasImages ? `
                <div class="carousel relative" id="carousel-${projectIndex}">
                  <div class="carousel-inner" id="carousel-inner-${projectIndex}" style="width: ${imageUrls.length * 100}%">
                    ${imageUrls.map((url, imgIndex) => `
                      <div class="carousel-item" style="width: ${100 / imageUrls.length}%">
                        <img src="${url}" class="w-full h-56 object-cover cursor-pointer hover:opacity-90 transition" onclick="window.open('${url}', '_blank')">
                      </div>
                    `).join('')}
                  </div>
                  ${imageUrls.length > 1 ? `
                    <button class="carousel-btn carousel-btn-prev" onclick="prevImage(${projectIndex})"><i class="fas fa-chevron-left"></i></button>
                    <button class="carousel-btn carousel-btn-next" onclick="nextImage(${projectIndex})"><i class="fas fa-chevron-right"></i></button>
                    <div class="carousel-dots" id="carousel-dots-${projectIndex}">
                      ${imageUrls.map((_, idx) => `<div class="carousel-dot ${idx === 0 ? 'active' : ''}" onclick="goToImage(${projectIndex}, ${idx})"></div>`).join('')}
                    </div>
                  ` : ''}
                </div>
              ` : ''}
              <div class="p-5">
                <h3 class="text-lg font-semibold text-white mb-2">${project.title}</h3>
                <p class="text-slate-300 text-sm leading-relaxed">${project.description || ''}</p>
                ${project.tech_stack && project.tech_stack.length > 0 ? `<div class="flex flex-wrap gap-2 mt-3">${project.tech_stack.map(t => `<span class="px-2 py-1 bg-slate-600 rounded-md text-xs text-slate-300">${t}</span>`).join('')}</div>` : ''}
                ${project.live_url ? `<div class="mt-3"><a href="${project.live_url}" target="_blank" class="text-blue-400 hover:text-blue-300 text-sm"><i class="fas fa-external-link-alt mr-1"></i>View Project</a></div>` : ''}
              </div>
            </div>
          `;
        });

        html += `</div></div>`;

        // Education & Achievements Row
        html += `<div class="grid md:grid-cols-2 gap-8">`;

        // Education
        html += `<div class="bg-slate-800 rounded-2xl p-8 border border-slate-700">
            <h2 class="text-xl font-bold text-white mb-4"><i class="fas fa-graduation-cap text-blue-400 mr-2"></i>Education</h2>`;

        education.forEach(edu => {
          html += `
            <div class="mb-4 last:mb-0">
              <div class="flex flex-wrap justify-between items-start">
                <div>
                  <h3 class="text-md font-semibold text-white">${edu.degree}${edu.field ? ` in ${edu.field}` : ''}</h3>
                  <p class="text-blue-400">${edu.institution}${edu.location ? `, ${edu.location}` : ''}</p>
                </div>
                <span class="text-slate-400 text-sm">${edu.start_year} — ${edu.end_year || 'Present'}</span>
              </div>
              ${edu.grade ? `<p class="text-yellow-500 text-sm mt-1"><i class="fas fa-star mr-1"></i>Grade: ${edu.grade}</p>` : ''}
              ${edu.description ? `<p class="text-slate-300 text-sm mt-1">${edu.description}</p>` : ''}
            </div>
            ${education.indexOf(edu) < education.length - 1 ? '<div class="border-b border-slate-700 my-3"></div>' : ''}
          `;
        });

        html += `</div>`;

        // Achievements
        html += `<div class="bg-slate-800 rounded-2xl p-8 border border-slate-700">
            <h2 class="text-xl font-bold text-white mb-4"><i class="fas fa-trophy text-yellow-500 mr-2"></i>Achievements</h2>`;

        achievements.forEach(ach => {
          html += `
            <div class="mb-3 last:mb-0 border-l-2 border-yellow-500 pl-3">
              <h3 class="text-md font-semibold text-white">${ach.title}</h3>
              <p class="text-slate-400 text-sm">${ach.issuer} • ${ach.date}</p>
              ${ach.description ? `<p class="text-slate-300 text-xs mt-1">${ach.description}</p>` : ''}
            </div>
            ${achievements.indexOf(ach) < achievements.length - 1 ? '<div class="border-b border-slate-700 my-2"></div>' : ''}
          `;
        });

        html += `</div></div>`;

        // Footer
        html += `
          <div class="text-center text-slate-500 text-sm mt-8 pt-4 border-t border-slate-800">
            <p>© ${new Date().getFullYear()} ${profile.name || 'Uddi Benkiff Awinda'} • Professional Portfolio</p>
          </div>
        `;

        document.getElementById('content').innerHTML = html;

        // Initialize carousel indices and dots
        window.carouselIndices = {};
        projects.forEach((_, idx) => {
          window.carouselIndices[idx] = 0;
        });

      } catch (error) {
        document.getElementById('content').innerHTML = `<div class="text-red-500 text-center p-8 bg-slate-800 rounded-2xl">Error loading portfolio. Make sure the backend is running on port 3000.<br><br>${error.message}</div>`;
        console.error(error);
      }
    }

    window.prevImage = function(projectId) {
      const inner = document.getElementById(`carousel-inner-${projectId}`);
      const items = inner.querySelectorAll('.carousel-item');
      const dots = document.querySelectorAll(`#carousel-dots-${projectId} .carousel-dot`);
      if (window.carouselIndices[projectId] > 0) {
        window.carouselIndices[projectId]--;
        inner.style.transform = `translateX(-${window.carouselIndices[projectId] * (100 / items.length)}%)`;
        dots.forEach((dot, idx) => {
          dot.classList.toggle('active', idx === window.carouselIndices[projectId]);
        });
      }
    };

    window.nextImage = function(projectId) {
      const inner = document.getElementById(`carousel-inner-${projectId}`);
      const items = inner.querySelectorAll('.carousel-item');
      const dots = document.querySelectorAll(`#carousel-dots-${projectId} .carousel-dot`);
      if (window.carouselIndices[projectId] < items.length - 1) {
        window.carouselIndices[projectId]++;
        inner.style.transform = `translateX(-${window.carouselIndices[projectId] * (100 / items.length)}%)`;
        dots.forEach((dot, idx) => {
          dot.classList.toggle('active', idx === window.carouselIndices[projectId]);
        });
      }
    };

    window.goToImage = function(projectId, index) {
      const inner = document.getElementById(`carousel-inner-${projectId}`);
      const items = inner.querySelectorAll('.carousel-item');
      const dots = document.querySelectorAll(`#carousel-dots-${projectId} .carousel-dot`);
      window.carouselIndices[projectId] = index;
      inner.style.transform = `translateX(-${index * (100 / items.length)}%)`;
      dots.forEach((dot, idx) => {
        dot.classList.toggle('active', idx === index);
      });
    };

    loadPortfolio();
  </script>
</body>
</html>
