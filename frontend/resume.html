<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uddi Benkiff Awinda - Resume</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @media print {
      .no-print { display: none !important; }
      body { background: white; margin: 0; padding: 0; }
      .shadow-lg { box-shadow: none !important; }
    }
  </style>
</head>
<body class="bg-slate-100">
  <!-- Toolbar -->
  <div class="no-print bg-slate-800 text-white px-4 py-2 flex justify-between sticky top-0 z-10 text-sm">
    <a href="/" class="text-slate-300 hover:text-white">← Back to Portfolio</a>
    <button onclick="window.print()" class="bg-blue-500 hover:bg-blue-600 px-3 py-1.5 rounded text-white text-sm">🖨️ Print / Download PDF</button>
  </div>

  <div id="resume-content" class="max-w-4xl mx-auto py-6 px-4">
    <div class="text-center text-xl">Loading resume...</div>
  </div>

  <script>
    const API_URL = '/api';

    async function loadResume() {
      try {
        const res = await fetch(`${API_URL}/resume/data`);
        const data = await res.json();
        const { profile = {}, experience = [], education = [], skills = [], projects = [], achievements = [] } = data;

        const skillsByCategory = {};
        skills.forEach(s => {
          if (!skillsByCategory[s.category]) skillsByCategory[s.category] = [];
          skillsByCategory[s.category].push(s);
        });

        let html = `
          <div class="bg-white shadow-lg print:shadow-none">
            <div class="p-6 print:p-5">
              <!-- Header - Reduced height -->
              <div class="border-b-2 border-blue-500 pb-3 mb-4">
                <div class="flex gap-4 items-center">
                  ${profile.avatar_url ? `<img src="${profile.avatar_url}" class="w-14 h-14 rounded-full object-cover border-2 border-blue-500">` : ''}
                  <div>
                    <h1 class="text-2xl font-bold text-gray-800">${profile.name || 'Uddi Benkiff Awinda'}</h1>
                    <p class="text-xs font-semibold text-blue-600 uppercase tracking-wide mt-1">${profile.title || 'PM | Civil Projects Engineer'}</p>
                    <div class="flex flex-wrap gap-3 text-xs text-gray-500 mt-1.5">
                      ${profile.email ? `<span>📧 ${profile.email}</span>` : ''}
                      ${profile.phone ? `<span>📞 ${profile.phone}</span>` : ''}
                      ${profile.location ? `<span>📍 ${profile.location}</span>` : ''}
                      ${profile.linkedin ? `<span>🔗 ${profile.linkedin}</span>` : ''}
                    </div>
                  </div>
                </div>
              </div>

              <div class="flex gap-6">
                <!-- Left Column -->
                <div class="flex-1 space-y-4">
                  ${profile.bio ? `
                    <div>
                      <h2 class="text-xs font-bold text-blue-600 uppercase border-b pb-1">Personal Statement</h2>
                      <p class="text-xs text-gray-700 mt-1.5 leading-relaxed">${profile.bio}</p>
                    </div>
                  ` : ''}

                  ${experience.length > 0 ? `
                    <div>
                      <h2 class="text-xs font-bold text-blue-600 uppercase border-b pb-1">Professional Experience</h2>
                      <div class="space-y-3 mt-2">
                        ${experience.map((exp, idx) => `
                          <div>
                            <div class="flex justify-between flex-wrap">
                              <h3 class="text-sm font-bold text-gray-800">${exp.job_title}</h3>
                              <span class="text-xs text-gray-500">${exp.start_date} — ${exp.current ? 'Present' : exp.end_date}</span>
                            </div>
                            <p class="text-xs text-blue-600 font-medium">${exp.company}${exp.location ? ` | ${exp.location}` : ''}</p>
                            <p class="text-xs text-gray-600 mt-1">${exp.description || ''}</p>
                            ${exp.highlights && exp.highlights.length > 0 ? `<ul class="mt-1 space-y-0.5">${exp.highlights.map(h => `<li class="text-xs text-gray-600 flex items-start gap-1.5"><span class="text-blue-500">•</span> ${h}</li>`).join('')}</ul>` : ''}
                            ${idx < experience.length - 1 ? '<div class="border-b border-gray-200 mt-3"></div>' : ''}
                          </div>
                        `).join('')}
                      </div>
                    </div>
                  ` : ''}

                  ${projects.length > 0 ? `
                    <div>
                      <h2 class="text-xs font-bold text-blue-600 uppercase border-b pb-1">Key Projects</h2>
                      <div class="space-y-2 mt-2">
                        ${projects.map((p, idx) => `
                          <div>
                            <div class="flex gap-2 items-start">
                              ${p.image_urls && p.image_urls[0] ? `<img src="${p.image_urls[0]}" class="w-8 h-8 rounded object-cover">` : ''}
                              <div class="flex-1">
                                <h3 class="text-xs font-bold text-gray-800">${p.title}</h3>
                                <p class="text-xs text-gray-600">${p.description || ''}</p>
                              </div>
                            </div>
                            ${idx < projects.length - 1 ? '<div class="border-b border-gray-200 mt-2"></div>' : ''}
                          </div>
                        `).join('')}
                      </div>
                    </div>
                  ` : ''}

                  ${education.length > 0 ? `
                    <div>
                      <h2 class="text-xs font-bold text-blue-600 uppercase border-b pb-1">Education</h2>
                      <div class="space-y-2 mt-2">
                        ${education.map((edu, idx) => `
                          <div>
                            <div class="flex justify-between flex-wrap">
                              <h3 class="text-xs font-bold text-gray-800">${edu.degree}${edu.field ? ` in ${edu.field}` : ''}</h3>
                              <span class="text-xs text-gray-500">${edu.start_year} — ${edu.end_year || 'Present'}</span>
                            </div>
                            <p class="text-xs text-gray-600">${edu.institution}${edu.location ? `, ${edu.location}` : ''}</p>
                            ${edu.grade ? `<p class="text-xs text-yellow-600 mt-0.5">Grade: ${edu.grade}</p>` : ''}
                            ${idx < education.length - 1 ? '<div class="border-b border-gray-200 mt-2"></div>' : ''}
                          </div>
                        `).join('')}
                      </div>
                    </div>
                  ` : ''}
                </div>

                <!-- Right Column -->
                <div class="w-44 shrink-0 space-y-4">
                  ${Object.keys(skillsByCategory).map(cat => `
                    <div>
                      <h2 class="text-xs font-bold text-blue-600 uppercase border-b pb-1">${cat}</h2>
                      <ul class="mt-1.5 space-y-0.5">
                        ${skillsByCategory[cat].map(s => `<li class="text-xs text-gray-700 flex items-center gap-1.5"><span class="h-1 w-1 rounded-full bg-blue-500"></span> ${s.name}</li>`).join('')}
                      </ul>
                    </div>
                  `).join('')}

                  ${achievements.length > 0 ? `
                    <div>
                      <h2 class="text-xs font-bold text-blue-600 uppercase border-b pb-1">Achievements</h2>
                      <div class="mt-1.5 space-y-1.5">
                        ${achievements.map((a, idx) => `
                          <div>
                            <p class="text-xs font-semibold text-gray-800">${a.title}</p>
                            <p class="text-xs text-gray-500">${a.issuer}</p>
                            ${idx < achievements.length - 1 ? '<div class="border-b border-gray-200 mt-1"></div>' : ''}
                          </div>
                        `).join('')}
                      </div>
                    </div>
                  ` : ''}
                </div>
              </div>
            </div>
          </div>
        `;

        document.getElementById('resume-content').innerHTML = html;
      } catch (error) {
        document.getElementById('resume-content').innerHTML = `<div class="text-red-500 text-center p-8">Error loading resume. Please try again.</div>`;
        console.error(error);
      }
    }

    loadResume();
  </script>
</body>
</html>
