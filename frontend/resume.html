<!DOCTYPE html>
<html>
<head>
    <title>Resume - Uddi Benkiff</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
    <div class="max-w-4xl mx-auto bg-white p-8 m-8 shadow-lg">
        <div id="resume-content">Loading resume...</div>
        <div class="text-center mt-4 no-print">
            <button onclick="window.print()" class="bg-blue-600 text-white px-4 py-2 rounded">Print</button>
        </div>
    </div>
    <script>
        fetch('/api/resume/data')
            .then(res => res.json())
            .then(data => {
                const profile = data.profile || {};
                document.getElementById('resume-content').innerHTML = `
                    <h1 class="text-2xl font-bold">${profile.name || 'Uddi Benkiff Awinda'}</h1>
                    <p class="text-blue-600">${profile.title || 'Civil Engineer'}</p>
                    <p>${profile.email || ''} | ${profile.phone || ''} | ${profile.location || ''}</p>
                    <hr class="my-4">
                    <h2 class="font-bold mt-4">Personal Statement</h2>
                    <p>${profile.bio || ''}</p>
                `;
            });
    </script>
</body>
</html>
